<svg width="980" height="280" viewBox="0 0 980 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="280" fill="#09242C"/>

  <!-- Code texture elements — scattered background -->
  <text x="595" y="42"  font-family="'Courier New', monospace" font-size="10" fill="#14B8A6" opacity="0.09">const</text>
  <text x="658" y="70"  font-family="'Courier New', monospace" font-size="10" fill="#0D9488"  opacity="0.10">&lt;/&gt;</text>
  <text x="728" y="50"  font-family="'Courier New', monospace" font-size="10" fill="#14B8A6" opacity="0.09">async</text>
  <text x="600" y="200" font-family="'Courier New', monospace" font-size="9"  fill="#0D9488"  opacity="0.08">fn()</text>
  <text x="670" y="220" font-family="'Courier New', monospace" font-size="9"  fill="#14B8A6" opacity="0.09">import</text>
  <text x="762" y="205" font-family="'Courier New', monospace" font-size="9"  fill="#0D9488"  opacity="0.07">01010</text>
  <text x="596" y="248" font-family="'Courier New', monospace" font-size="10" fill="#14B8A6" opacity="0.08">{ }</text>
  <text x="680" y="250" font-family="'Courier New', monospace" font-size="9"  fill="#0D9488"  opacity="0.08">// .</text>
  <text x="760" y="248" font-family="'Courier New', monospace" font-size="9"  fill="#14B8A6" opacity="0.07">true</text>
  <text x="104" y="40"  font-family="'Courier New', monospace" font-size="9"  fill="#0D9488"  opacity="0.06">01</text>
  <text x="210" y="40"  font-family="'Courier New', monospace" font-size="9"  fill="#14B8A6" opacity="0.06">/&gt;</text>

  <!-- ═══ INTRICATE TSUBA — right side  CX=888 CY=125 R=44 ═══ -->
  <g transform="translate(888, 125)">
    <!-- Outer glow halos -->
    <circle r="64" fill="#0D9488" opacity="0.04"/>
    <circle r="54" fill="#0D9488" opacity="0.07"/>

    <!-- Disc body -->
    <circle r="44" fill="#0B2E37"/>

    <!-- Outer double rim -->
    <circle r="44" stroke="#14B8A6" stroke-width="1.8" fill="none" opacity="0.85"/>
    <circle r="41" stroke="#0D9488" stroke-width="0.5" fill="none" opacity="0.50"/>

    <!-- Outer dash band (just outside petal tips) -->
    <circle r="36.5" stroke="#14B8A6" stroke-width="0.5" fill="none" stroke-dasharray="2 4" opacity="0.35"/>

    <!-- 8 PRIMARY organic petals — cubic bezier teardrops  r=18→36 -->
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(45)"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(90)"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(135)"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(180)"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(225)"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(270)"/>
    <path d="M 0,-36 C 7,-28 7,-14 0,-10 C -7,-14 -7,-28 0,-36 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.80" transform="rotate(315)"/>

    <!-- 8 SECONDARY petals — narrower, 22.5° offset fills inter-petal space -->
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(22.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(67.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(112.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(157.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(202.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(247.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(292.5)"/>
    <path d="M 0,-31 C 4,-25 4,-16 0,-12 C -4,-16 -4,-25 0,-31 Z" fill="#09242C" stroke="#0D9488" stroke-width="0.50" opacity="0.70" transform="rotate(337.5)"/>

    <!-- Mid ring — drawn after petals, appears as metallic inner band -->
    <circle r="22" stroke="#14B8A6" stroke-width="0.8" fill="none" opacity="0.50"/>

    <!-- Nakago-ana (blade hole) -->
    <ellipse rx="6" ry="10" fill="#09242C" stroke="#14B8A6" stroke-width="1.0" opacity="0.90"/>

    <!-- Kozuka side holes -->
    <ellipse cx="36"  cy="0" rx="1.8" ry="4.0" fill="#09242C" stroke="#0D9488" stroke-width="0.6" opacity="0.65"/>
    <ellipse cx="-36" cy="0" rx="1.8" ry="4.0" fill="#09242C" stroke="#0D9488" stroke-width="0.6" opacity="0.65"/>

    <!-- Cardinal accent dots (r=49, outside rim) -->
    <circle cx="0"   cy="-49" r="2.5" fill="#14B8A6" opacity="0.55"/>
    <circle cx="0"   cy="49"  r="2.5" fill="#14B8A6" opacity="0.55"/>
    <circle cx="-49" cy="0"   r="2.5" fill="#14B8A6" opacity="0.55"/>
    <circle cx="49"  cy="0"   r="2.5" fill="#14B8A6" opacity="0.55"/>

    <!-- 45° diagonal accent dots -->
    <circle cx="34.6"  cy="-34.6" r="1.5" fill="#14B8A6" opacity="0.30"/>
    <circle cx="34.6"  cy="34.6"  r="1.5" fill="#14B8A6" opacity="0.30"/>
    <circle cx="-34.6" cy="-34.6" r="1.5" fill="#14B8A6" opacity="0.30"/>
    <circle cx="-34.6" cy="34.6"  r="1.5" fill="#14B8A6" opacity="0.30"/>
  </g>
  <!-- ═══ END TSUBA ═══ -->

  <!-- Vertical accent line — left -->
  <line x1="68" y1="44" x2="68" y2="230" stroke="#0D9488" stroke-width="1" opacity="0.3"/>
  <circle cx="68" cy="44"  r="2" fill="#0D9488" opacity="0.4"/>
  <circle cx="68" cy="230" r="2" fill="#0D9488" opacity="0.4"/>

  <!-- Greeting — native scripts -->
  <text x="88" y="62"
    font-family="'Noto Sans', 'Segoe UI', Arial, sans-serif"
    font-size="11" fill="#0D9488" opacity="0.65"
    letter-spacing="1.5">Hello · నమస్కారం · வணக்கம் · नमस्ते · Hola · こんにちは</text>

  <!-- Venkata -->
  <text x="86" y="118"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48" font-weight="400" fill="#EAF4F3" letter-spacing="-1">Venkata</text>

  <!-- Sai Charan Naidu -->
  <text x="86" y="174"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48" font-weight="400" fill="#EAF4F3" letter-spacing="-1"><tspan fill="#2DD4BF" font-weight="600">Sai</tspan> Charan Naidu</text>

  <!-- Kuppala -->
  <text x="86" y="230"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48" font-weight="400" fill="#EAF4F3" letter-spacing="-1">Kuppala</text>

  <!-- Ocean waves — bottom -->
  <path d="M0,252 C163,241 327,263 490,252 C653,241 817,263 980,252 L980,280 L0,280 Z"
    fill="#0D9488" opacity="0.18"/>
  <path d="M0,260 C130,251 262,270 392,260 C522,250 653,270 784,260 C848,255 915,263 980,260 L980,280 L0,280 Z"
    fill="#0D9488" opacity="0.12"/>
  <path d="M0,268 C245,260 490,276 735,268 C857,264 919,272 980,268 L980,280 L0,280 Z"
    fill="#14B8A6" opacity="0.08"/>
</svg>
