<svg width="980" height="280" viewBox="0 0 980 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mokko-gata: R_L=36 (lobe), R_W=28 (waist), d=5
         Waist check: B(0.5) = (0+15+108+36)/8 = 19.9 → r=28.1 ✓ -->
    <clipPath id="mc-g">
      <path d="M 0,-36 C 5,-36 36,-5 36,0 C 36,5 5,36 0,36 C -5,36 -36,5 -36,0 C -36,-5 -5,-36 0,-36 Z"/>
    </clipPath>
  </defs>

  <rect width="980" height="280" fill="#09242C"/>

  <!-- Code texture — scattered background -->
  <text x="596" y="42"  font-family="'Courier New',monospace" font-size="10" fill="#14B8A6" opacity="0.09">const</text>
  <text x="658" y="70"  font-family="'Courier New',monospace" font-size="10" fill="#0D9488"  opacity="0.10">&lt;/&gt;</text>
  <text x="730" y="50"  font-family="'Courier New',monospace" font-size="10" fill="#14B8A6" opacity="0.09">async</text>
  <text x="600" y="200" font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.08">fn()</text>
  <text x="672" y="220" font-family="'Courier New',monospace" font-size="9"  fill="#14B8A6" opacity="0.09">import</text>
  <text x="762" y="205" font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.07">01010</text>
  <text x="598" y="248" font-family="'Courier New',monospace" font-size="10" fill="#14B8A6" opacity="0.08">{ }</text>
  <text x="680" y="250" font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.08">// .</text>
  <text x="762" y="248" font-family="'Courier New',monospace" font-size="9"  fill="#14B8A6" opacity="0.07">true</text>
  <text x="106" y="40"  font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.06">01</text>
  <text x="212" y="40"  font-family="'Courier New',monospace" font-size="9"  fill="#14B8A6" opacity="0.06">/&gt;</text>

  <!-- ═══ MOKKO-GATA TSUBA  CX=888 CY=125  R_L=36 ═══ -->
  <g transform="translate(888,125)">

    <!-- Glow halos -->
    <circle r="54" fill="#0D9488" opacity="0.04"/>
    <circle r="45" fill="#0D9488" opacity="0.07"/>

    <!-- Disc body -->
    <path d="M 0,-36 C 5,-36 36,-5 36,0 C 36,5 5,36 0,36 C -5,36 -36,5 -36,0 C -36,-5 -5,-36 0,-36 Z" fill="#0B2E37"/>

    <!-- Inner detail — all clipped to mokko boundary -->
    <g clip-path="url(#mc-g)">

      <!-- Outer decorative ring (thin, just inside rim) -->
      <circle r="27" stroke="#14B8A6" stroke-width="0.45" fill="none" opacity="0.35" stroke-dasharray="2.5 3.5"/>

      <!-- Outer ring of 8 organic leaf petals — orbit r=18 -->
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(45)"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(90)"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(135)"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(180)"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(225)"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(270)"/>
      <path d="M 0,-26 C 5,-24 5.5,-20 5.5,-18 C 5.5,-14 3.5,-12 0,-11 C -3.5,-12 -5.5,-14 -5.5,-18 C -5.5,-20 -5,-24 0,-26 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.65" opacity="0.85" transform="rotate(315)"/>

      <!-- Inner ring of 8 small leaf petals — orbit r=7, offset 22.5° -->
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(22.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(67.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(112.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(157.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(202.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(247.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(292.5)"/>
      <path d="M 0,-10 C 1.5,-9.5 2,-8 2,-7 C 2,-5.5 1.5,-4.5 0,-4 C -1.5,-4.5 -2,-5.5 -2,-7 C -2,-8 -1.5,-9.5 0,-10 Z" fill="#09242C" stroke="#14B8A6" stroke-width="0.5" opacity="0.75" transform="rotate(337.5)"/>

    </g><!-- end clip -->

    <!-- Outer mokko double rim — drawn above clip -->
    <path d="M 0,-36 C 5,-36 36,-5 36,0 C 36,5 5,36 0,36 C -5,36 -36,5 -36,0 C -36,-5 -5,-36 0,-36 Z"
      fill="none" stroke="#14B8A6" stroke-width="1.8" opacity="0.85"/>
    <path d="M 0,-33 C 4.5,-33 33,-4.5 33,0 C 33,4.5 4.5,33 0,33 C -4.5,33 -33,4.5 -33,0 C -33,-4.5 -4.5,-33 0,-33 Z"
      fill="none" stroke="#0D9488" stroke-width="0.5" opacity="0.45"/>

    <!-- Nakago-ana (blade slot) — covers inner hole ring -->
    <ellipse rx="5" ry="8.5" fill="#09242C" stroke="#14B8A6" stroke-width="1.0" opacity="0.90"/>

    <!-- Kozuka side holes at waist -->
    <ellipse cx="28"  cy="0" rx="1.5" ry="3.5" fill="#09242C" stroke="#0D9488" stroke-width="0.6" opacity="0.65"/>
    <ellipse cx="-28" cy="0" rx="1.5" ry="3.5" fill="#09242C" stroke="#0D9488" stroke-width="0.6" opacity="0.65"/>

    <!-- Cardinal lobe accent dots -->
    <circle cx="0"   cy="-39" r="2.0" fill="#14B8A6" opacity="0.55"/>
    <circle cx="0"   cy="39"  r="2.0" fill="#14B8A6" opacity="0.55"/>
    <circle cx="-39" cy="0"   r="2.0" fill="#14B8A6" opacity="0.55"/>
    <circle cx="39"  cy="0"   r="2.0" fill="#14B8A6" opacity="0.55"/>

  </g>
  <!-- ═══ END TSUBA ═══ -->

  <!-- Vertical accent line — left -->
  <line x1="68" y1="44" x2="68" y2="230" stroke="#0D9488" stroke-width="1" opacity="0.3"/>
  <circle cx="68" cy="44"  r="2" fill="#0D9488" opacity="0.4"/>
  <circle cx="68" cy="230" r="2" fill="#0D9488" opacity="0.4"/>

  <!-- Greeting -->
  <text x="88" y="62"
    font-family="'Noto Sans','Segoe UI',Arial,sans-serif"
    font-size="11" fill="#0D9488" opacity="0.65" letter-spacing="1.5">Hello · నమస్కారం · வணக்கம் · नमस्ते · Hola · こんにちは</text>

  <!-- Venkata -->
  <text x="86" y="118"
    font-family="Georgia,'Times New Roman',serif"
    font-size="48" font-weight="400" fill="#EAF4F3" letter-spacing="-1">Venkata</text>

  <!-- Sai Charan Naidu -->
  <text x="86" y="174"
    font-family="Georgia,'Times New Roman',serif"
    font-size="48" font-weight="400" fill="#EAF4F3" letter-spacing="-1"><tspan fill="#2DD4BF" font-weight="600">Sai</tspan> Charan Naidu</text>

  <!-- Kuppala -->
  <text x="86" y="230"
    font-family="Georgia,'Times New Roman',serif"
    font-size="48" font-weight="400" fill="#EAF4F3" letter-spacing="-1">Kuppala</text>

  <!-- Ocean waves -->
  <path d="M0,252 C163,241 327,263 490,252 C653,241 817,263 980,252 L980,280 L0,280 Z" fill="#0D9488" opacity="0.18"/>
  <path d="M0,260 C130,251 262,270 392,260 C522,250 653,270 784,260 C848,255 915,263 980,260 L980,280 L0,280 Z" fill="#0D9488" opacity="0.12"/>
  <path d="M0,268 C245,260 490,276 735,268 C857,264 919,272 980,268 L980,280 L0,280 Z" fill="#14B8A6" opacity="0.08"/>
</svg>
