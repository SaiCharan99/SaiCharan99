<svg width="980" height="260" viewBox="0 0 980 260" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="260" fill="#09242C"/>

  <!-- Kolam rings — right side decoration -->
  <circle cx="870" cy="130" r="195" stroke="#0D9488" stroke-width="0.8" stroke-dasharray="6 8" fill="none" opacity="0.14"/>
  <circle cx="870" cy="130" r="135" stroke="#0D9488" stroke-width="0.6" stroke-dasharray="4 6" fill="none" opacity="0.11"/>
  <circle cx="870" cy="130" r="75"  stroke="#0D9488" stroke-width="0.5" stroke-dasharray="3 4" fill="none" opacity="0.11"/>
  <circle cx="870" cy="130" r="10"  fill="#0D9488" opacity="0.28"/>
  <circle cx="870" cy="130" r="4"   fill="#0D9488" opacity="0.5"/>

  <!-- Cardinal dots on outer ring -->
  <circle cx="870" cy="-65"  r="3" fill="#0D9488" opacity="0.2"/>
  <circle cx="870" cy="325"  r="3" fill="#0D9488" opacity="0.2"/>
  <circle cx="675" cy="130"  r="3" fill="#0D9488" opacity="0.2"/>

  <!-- Vertical accent line -->
  <line x1="68" y1="44" x2="68" y2="216" stroke="#0D9488" stroke-width="1" opacity="0.3"/>
  <circle cx="68" cy="44"  r="2" fill="#0D9488" opacity="0.4"/>
  <circle cx="68" cy="216" r="2" fill="#0D9488" opacity="0.4"/>

  <!-- Greeting line -->
  <text x="88" y="63"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    fill="#0D9488"
    opacity="0.65"
    letter-spacing="2.8">VANAKKAM · HELLO · NAMASTE · KONNICHIWA · HOLA</text>

  <!-- Venkata (small prefix) -->
  <text x="86" y="120"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="300"
    fill="#7FB5BC"
    letter-spacing="-0.5">Venkata</text>

  <!-- Sai Charan Naidu (large) -->
  <text x="86" y="172"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50"
    font-weight="400"
    fill="#EAF4F3"
    letter-spacing="-1">
    <tspan fill="#0D9488" font-weight="600">Sai</tspan> Charan Naidu
  </text>

  <!-- Kuppala (italic teal) -->
  <text x="86" y="224"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50"
    font-style="italic"
    font-weight="300"
    fill="#0D9488"
    letter-spacing="-1">Kuppala</text>

  <!-- Location sub -->
  <text x="88" y="250"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9.5"
    fill="#7FB5BC"
    opacity="0.5"
    letter-spacing="2.2">MELBOURNE, AU  ·  M.IT  ·  UNIVERSITY OF MELBOURNE</text>
</svg>
