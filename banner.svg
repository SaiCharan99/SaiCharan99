<svg width="980" height="280" viewBox="0 0 980 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="280" fill="#09242C"/>

  <!-- Kolam rings — right side decoration -->
  <circle cx="870" cy="140" r="195" stroke="#0D9488" stroke-width="0.8" stroke-dasharray="6 8" fill="none" opacity="0.14"/>
  <circle cx="870" cy="140" r="135" stroke="#0D9488" stroke-width="0.6" stroke-dasharray="4 6" fill="none" opacity="0.11"/>
  <circle cx="870" cy="140" r="75"  stroke="#0D9488" stroke-width="0.5" stroke-dasharray="3 4" fill="none" opacity="0.11"/>
  <circle cx="870" cy="140" r="10"  fill="#0D9488" opacity="0.28"/>
  <circle cx="870" cy="140" r="4"   fill="#0D9488" opacity="0.5"/>
  <circle cx="675" cy="140" r="3"   fill="#0D9488" opacity="0.2"/>

  <!-- Vertical accent line -->
  <line x1="68" y1="44" x2="68" y2="238" stroke="#0D9488" stroke-width="1" opacity="0.3"/>
  <circle cx="68" cy="44"  r="2" fill="#0D9488" opacity="0.4"/>
  <circle cx="68" cy="238" r="2" fill="#0D9488" opacity="0.4"/>

  <!-- Greeting — native scripts -->
  <text x="88" y="62"
    font-family="'Noto Sans', 'Segoe UI', Arial, sans-serif"
    font-size="11"
    fill="#0D9488"
    opacity="0.65"
    letter-spacing="1.5">வணக்கம் · Hello · నమస్కారం · नमस्ते · こんにちは · Hola</text>

  <!-- Venkata — same style as rest -->
  <text x="86" y="125"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    fill="#EAF4F3"
    letter-spacing="-1">Venkata</text>

  <!-- Sai Charan Naidu — only Sai differs -->
  <text x="86" y="182"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    fill="#EAF4F3"
    letter-spacing="-1"><tspan fill="#2DD4BF" font-weight="600">Sai</tspan> Charan Naidu</text>

  <!-- Kuppala — same style as Venkata -->
  <text x="86" y="239"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    fill="#EAF4F3"
    letter-spacing="-1">Kuppala</text>

  <!-- Location sub -->
  <text x="88" y="265"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9.5"
    fill="#7FB5BC"
    opacity="0.5"
    letter-spacing="2.2">MELBOURNE, AU  ·  M.IT  ·  UNIVERSITY OF MELBOURNE</text>
</svg>
