<svg width="980" height="280" viewBox="0 0 980 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ts" d="M 390 200 C 390 249.7 342.8 283.5 313.1 313.1 C 283.5 342.8 249.7 390 200 390 C 150.3 390 116.5 342.8 86.9 313.1 C 57.2 283.5 10 249.7 10 200 C 10 150.3 57.2 116.5 86.9 86.9 C 116.5 57.2 150.3 10 200 10 C 249.7 10 283.5 57.2 313.1 86.9 C 342.8 116.5 390 150.3 390 200 Z"/>
    <clipPath id="pc">
      <use href="#ts" transform="translate(200 200) scale(.88) translate(-200 -200)"/>
    </clipPath>
    <pattern id="sg" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <g fill="none" stroke="#14B8A6" stroke-width="2.4" stroke-linecap="square">
        <path d="M 0 15 L 15 15 L 15 0 M 15 15 L 30 15 L 30 0 M 15 15 L 15 30 L 0 30 M 30 15 L 30 30 M 60 45 L 45 45 L 45 60 M 45 45 L 30 45 L 30 60 M 45 45 L 45 30 L 60 30 M 30 45 L 30 30 M 30 30 L 45 30 M 0 45 L 15 45 M 15 45 L 15 60 M 45 0 L 45 15 M 45 15 L 60 15"/>
      </g>
    </pattern>
    <clipPath id="wc"><rect width="980" height="280"/></clipPath>
  </defs>

  <style>
    /* ── waves ── */
    .w1 { animation: wl 14s linear infinite; }
    .w2 { animation: wr  9s linear infinite; }
    .w3 { animation: wl  6s linear infinite; }
    @keyframes wl { from { transform: translateX(0);      } to { transform: translateX(-980px); } }
    @keyframes wr { from { transform: translateX(-980px); } to { transform: translateX(0);      } }

    /* ── leaves: three-layer composition ──
       Layer 1 (.ht)  : horizontal travel, right → left, linear
       Layer 2 (.vb)  : gentle vertical bob, ease-in-out
       Layer 3 (.dg)  : dangle/sway rotation around leaf centre, ease-in-out  */

    @keyframes travel {
      from { transform: translateX(-28px);  }
      to   { transform: translateX(1010px); }
    }
    @keyframes vbob {
      0%   { transform: translateY(  0px); }
      25%  { transform: translateY(-10px); }
      75%  { transform: translateY( 10px); }
      100% { transform: translateY(  0px); }
    }
    @keyframes dangle {
      0%   { transform: rotate(-18deg); }
      30%  { transform: rotate( 14deg); }
      65%  { transform: rotate(-10deg); }
      100% { transform: rotate(-18deg); }
    }

    /* shared base classes */
    .ht { animation-name: travel;  animation-timing-function: linear;      animation-iteration-count: infinite; }
    .vb { animation-name: vbob;    animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
    .dg { animation-name: dangle;  animation-timing-function: ease-in-out; animation-iteration-count: infinite;
          transform-box: fill-box; transform-origin: center; }

    /* per-leaf horizontal travel — slow zen drift, negative delay pre-seeds position */
    .ht1  { animation-duration: 38s; animation-delay:   0s; }
    .ht2  { animation-duration: 48s; animation-delay: -18s; }
    .ht3  { animation-duration: 34s; animation-delay: -10s; }
    .ht4  { animation-duration: 44s; animation-delay: -28s; }
    .ht5  { animation-duration: 52s; animation-delay: -40s; }
    .ht6  { animation-duration: 42s; animation-delay: -15s; }
    .ht7  { animation-duration: 36s; animation-delay: -24s; }
    .ht8  { animation-duration: 46s; animation-delay:  -6s; }
    .ht9  { animation-duration: 50s; animation-delay: -36s; }
    .ht10 { animation-duration: 40s; animation-delay: -22s; }

    /* per-leaf vertical bob — slow and dreamy */
    .vb1  { animation-duration: 5.5s; animation-delay:  0.0s; }
    .vb2  { animation-duration: 4.8s; animation-delay: -1.5s; }
    .vb3  { animation-duration: 6.0s; animation-delay: -2.8s; }
    .vb4  { animation-duration: 4.5s; animation-delay: -0.8s; }
    .vb5  { animation-duration: 5.2s; animation-delay: -2.2s; }
    .vb6  { animation-duration: 4.2s; animation-delay: -1.8s; }
    .vb7  { animation-duration: 5.8s; animation-delay: -0.5s; }
    .vb8  { animation-duration: 4.6s; animation-delay: -3.2s; }
    .vb9  { animation-duration: 5.4s; animation-delay: -1.1s; }
    .vb10 { animation-duration: 5.0s; animation-delay: -2.0s; }

    /* per-leaf dangle — unhurried sway */
    .dg1  { animation-duration: 4.2s; animation-delay:  0.0s; }
    .dg2  { animation-duration: 4.8s; animation-delay: -1.0s; }
    .dg3  { animation-duration: 3.8s; animation-delay: -2.0s; }
    .dg4  { animation-duration: 5.2s; animation-delay: -0.6s; }
    .dg5  { animation-duration: 4.5s; animation-delay: -2.5s; }
    .dg6  { animation-duration: 5.5s; animation-delay: -1.4s; }
    .dg7  { animation-duration: 4.0s; animation-delay: -0.4s; }
    .dg8  { animation-duration: 5.0s; animation-delay: -3.0s; }
    .dg9  { animation-duration: 4.4s; animation-delay: -1.6s; }
    .dg10 { animation-duration: 4.7s; animation-delay: -0.8s; }
  </style>

  <rect width="980" height="280" fill="#09242C"/>

  <!-- Code texture -->
  <text x="596" y="42"  font-family="'Courier New',monospace" font-size="10" fill="#14B8A6" opacity="0.09">const</text>
  <text x="658" y="70"  font-family="'Courier New',monospace" font-size="10" fill="#0D9488"  opacity="0.10">&lt;/&gt;</text>
  <text x="730" y="50"  font-family="'Courier New',monospace" font-size="10" fill="#14B8A6" opacity="0.09">async</text>
  <text x="600" y="200" font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.08">fn()</text>
  <text x="672" y="220" font-family="'Courier New',monospace" font-size="9"  fill="#14B8A6" opacity="0.09">import</text>
  <text x="762" y="205" font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.07">01010</text>
  <text x="598" y="248" font-family="'Courier New',monospace" font-size="10" fill="#14B8A6" opacity="0.08">{ }</text>
  <text x="680" y="250" font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.08">// .</text>
  <text x="762" y="248" font-family="'Courier New',monospace" font-size="9"  fill="#14B8A6" opacity="0.07">true</text>
  <text x="106" y="40"  font-family="'Courier New',monospace" font-size="9"  fill="#0D9488"  opacity="0.06">01</text>
  <text x="212" y="40"  font-family="'Courier New',monospace" font-size="9"  fill="#14B8A6" opacity="0.06">/&gt;</text>

  <!-- Tsuba glow halos -->
  <circle cx="888" cy="125" r="54" fill="#0D9488" opacity="0.04"/>
  <circle cx="888" cy="125" r="45" fill="#0D9488" opacity="0.07"/>

  <!-- Tsuba -->
  <g transform="translate(888,125) scale(0.189) translate(-200,-200)">
    <use href="#ts" fill="#0B2E37"/>
    <g clip-path="url(#pc)">
      <rect x="0" y="0" width="400" height="400" fill="url(#sg)" opacity="0.26"/>
    </g>
    <ellipse cx="200" cy="200" rx="78" ry="44" fill="#1A5C70" stroke="#14B8A6" stroke-width="6" opacity="0.50"/>
    <ellipse cx="200" cy="200" rx="73" ry="39" fill="none" stroke="#0D9488" stroke-width="2.5" opacity="0.30"/>
    <use href="#ts" fill="none" stroke="#14B8A6" stroke-width="9.5" opacity="0.85"/>
    <g transform="translate(200 200) scale(.93) translate(-200 -200)">
      <use href="#ts" fill="none" stroke="#0D9488" stroke-width="2.6" opacity="0.45"/>
    </g>
    <path d="M 200 154 C 207 154 211 160 212 168 L 215 232 C 215 242 209 250 200 250 C 191 250 185 242 185 232 L 188 168 C 189 160 193 154 200 154 Z" fill="#09242C" stroke="none"/>
    <path d="M 165 200 C 165 192 158 188 149 188 C 138 188 130 196 130 204 C 130 212 138 220 149 220 C 158 220 165 216 165 208 Z" fill="#09242C" stroke="none"/>
    <path d="M 235 200 C 235 192 244 188 254 188 C 263 188 270 194 270 200 C 270 208 263 220 254 220 C 244 220 235 214 235 208 Z" fill="#09242C" stroke="none"/>
  </g>

  <!-- ═══ ZEN LEAVES ═══
       Structure per leaf:
         <g transform="translate(0, Y)">   ← fixes vertical lane
           <g class="ht htN">              ← horizontal travel (right→left)
             <g class="vb vbN">            ← vertical bob
               <path class="dg dgN" …/>   ← dangle rotation + leaf shape
             </g>
           </g>
         </g>
       Large leaf : M0,0 C-4,-7 -4,-17 0,-21 C4,-17 4,-7 0,0  (21px tall)
       Medium leaf: M0,0 C-3,-5 -3,-15 0,-18 C3,-15 3,-5 0,0  (18px tall) -->

  <g transform="translate(0,38)">
    <g class="ht ht1"><g class="vb vb1">
      <path class="dg dg1" d="M0,0 C-4,-7 -4,-17 0,-21 C4,-17 4,-7 0,0" fill="#14B8A6" opacity="0.55"/>
    </g></g>
  </g>

  <g transform="translate(0,82)">
    <g class="ht ht2"><g class="vb vb2">
      <path class="dg dg2" d="M0,0 C-3,-5 -3,-15 0,-18 C3,-15 3,-5 0,0" fill="#0D9488" opacity="0.50"/>
    </g></g>
  </g>

  <g transform="translate(0,55)">
    <g class="ht ht3"><g class="vb vb3">
      <path class="dg dg3" d="M0,0 C-4,-7 -4,-17 0,-21 C4,-17 4,-7 0,0" fill="#2DD4BF" opacity="0.45"/>
    </g></g>
  </g>

  <g transform="translate(0,125)">
    <g class="ht ht4"><g class="vb vb4">
      <path class="dg dg4" d="M0,0 C-3,-5 -3,-15 0,-18 C3,-15 3,-5 0,0" fill="#14B8A6" opacity="0.50"/>
    </g></g>
  </g>

  <g transform="translate(0,168)">
    <g class="ht ht5"><g class="vb vb5">
      <path class="dg dg5" d="M0,0 C-4,-7 -4,-17 0,-21 C4,-17 4,-7 0,0" fill="#0D9488" opacity="0.45"/>
    </g></g>
  </g>

  <g transform="translate(0,98)">
    <g class="ht ht6"><g class="vb vb6">
      <path class="dg dg6" d="M0,0 C-3,-5 -3,-15 0,-18 C3,-15 3,-5 0,0" fill="#2DD4BF" opacity="0.48"/>
    </g></g>
  </g>

  <g transform="translate(0,205)">
    <g class="ht ht7"><g class="vb vb7">
      <path class="dg dg7" d="M0,0 C-4,-7 -4,-17 0,-21 C4,-17 4,-7 0,0" fill="#14B8A6" opacity="0.42"/>
    </g></g>
  </g>

  <g transform="translate(0,148)">
    <g class="ht ht8"><g class="vb vb8">
      <path class="dg dg8" d="M0,0 C-3,-5 -3,-15 0,-18 C3,-15 3,-5 0,0" fill="#0D9488" opacity="0.48"/>
    </g></g>
  </g>

  <g transform="translate(0,220)">
    <g class="ht ht9"><g class="vb vb9">
      <path class="dg dg9" d="M0,0 C-4,-7 -4,-17 0,-21 C4,-17 4,-7 0,0" fill="#2DD4BF" opacity="0.40"/>
    </g></g>
  </g>

  <g transform="translate(0,68)">
    <g class="ht ht10"><g class="vb vb10">
      <path class="dg dg10" d="M0,0 C-3,-5 -3,-15 0,-18 C3,-15 3,-5 0,0" fill="#14B8A6" opacity="0.50"/>
    </g></g>
  </g>

  <!-- Vertical accent line -->
  <line x1="24" y1="44" x2="24" y2="230" stroke="#0D9488" stroke-width="1" opacity="0.3"/>
  <circle cx="24" cy="44"  r="2" fill="#0D9488" opacity="0.4"/>
  <circle cx="24" cy="230" r="2" fill="#0D9488" opacity="0.4"/>

  <!-- Greeting -->
  <text x="38" y="62"
    font-family="'Noto Sans','Segoe UI',Arial,sans-serif"
    font-size="12" fill="#2DD4BF" opacity="0.90" letter-spacing="1.5">Hello · నమస్కారం · வணக்கம் · नमस्ते · Hola · こんにちは</text>

  <text x="36" y="118"
    font-family="Georgia,'Times New Roman',serif"
